{% extends "base.html" %}
{% block title %}Book Consultation{% endblock %}
{% block newsletter %}{% endblock %}
{% block content %}
<div class="page-hero compact dashboard-hero-bg">
    <div class="container">
        <span class="section-kicker">Consultation</span>
        <h1>Book a Consultation</h1>
        <p>Choose a service, preferred date and time, and meeting mode.</p>
    </div>
</div>
<section class="section">
    <div class="container narrow-container">
        <form method="POST" class="auth-form glass-card">
            <div class="dashboard-grid-2">
                <div class="form-group"><label>Name *</label><input type="text" name="name" value="{{ user.name }}" required></div>
                <div class="form-group"><label>Email *</label><input type="email" name="email" value="{{ user.email }}" required></div>
                <div class="form-group"><label>Phone</label><input type="text" name="phone"></div>
                <div class="form-group"><label>Service Interest</label><select name="service_interest">{% for s in services %}<option value="{{ s.title }}">{{ s.title }}</option>{% endfor %}</select></div>
                <div class="form-group"><label>Date *</label><input type="date" name="booking_date" id="booking_date" required></div>
                <div class="form-group"><label>Time *</label>
                    <select name="booking_time" id="booking_time" required>
                        <option value="">Select Slot</option>
                        {% for hour in range(9, 18) %}
                            {% set slot1 = "%02d:00" % hour %}
                            {% set slot2 = "%02d:30" % hour %}
                            <option value="{{ slot1 }}" class="slot-option" data-time="{{ slot1 }}">{{ slot1 }}</option>
                            <option value="{{ slot2 }}" class="slot-option" data-time="{{ slot2 }}">{{ slot2 }}</option>
                        {% endfor %}
                    </select>
                </div>
                <script>
                    const bookedSlots = {{ booked_list|tojson }};
                    const dateInput = document.getElementById('booking_date');
                    const timeSelect = document.getElementById('booking_time');
                    function updateSlots() {
                        const selectedDate = dateInput.value;
                        Array.from(timeSelect.options).forEach(option => {
                            if (!option.value) return;
                            const slotKey = `${selectedDate} ${option.value}`;
                            if (bookedSlots.includes(slotKey)) {
                                option.disabled = true;
                                option.text = `${option.dataset.time} (Booked)`;
                            } else {
                                option.disabled = false;
                                option.text = option.dataset.time;
                            }
                        });
                    }
                    dateInput.addEventListener('change', updateSlots);
                    const today = new Date().toISOString().split('T')[0];
                    dateInput.setAttribute('min', today);
                </script>
                <div class="form-group"><label>Meeting Mode</label><select name="meeting_mode"><option>Google Meet</option><option>Phone Call</option><option>In Person</option><option>WhatsApp</option></select></div>
            </div>
            <div class="form-group"><label>Notes</label><textarea name="notes" rows="5" placeholder="Mention project context or meeting agenda."></textarea></div>
            <button class="btn-primary" type="submit">Request Consultation</button>
        </form>
    </div>
</section>
{% endblock %}
